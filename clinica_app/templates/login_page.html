{% extends 'base.html' %}
{% load static %}

{% block main_content %}
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 85vh;">
        <div class="col-md-5 col-lg-4">
            
            <div class="card border-0 shadow-lg p-3 mb-5 bg-white rounded-4">
                <div class="card-body p-4">
                    
                    <div class="text-center mb-5">
                        <div class="d-inline-flex align-items-center justify-content-center mb-3 rounded-circle" style="width: 60px; height: 60px; background-color: #e7f0ff;">
                            <i class="fas fa-tooth text-primary fs-3"></i>
                        </div>
                        <h3 class="fw-bolder tracking-tight text-primary mb-1">Sistema Odonto</h3>
                        <p class="text-muted small">Acesse sua conta para continuar</p>
                    </div>

                    <form action="{% url 'doLogin' %}" method="post">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-uppercase text-primary" style="letter-spacing: 0.5px; opacity: 0.8;">E-mail</label>
                            <input type="email" name="email" class="form-control border-0 bg-light p-3 rounded-3" 
                                   placeholder="nome@clinica.com" style="font-size: 0.9rem; border-left: 3px solid transparent;" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label small fw-bold text-uppercase text-primary" style="letter-spacing: 0.5px; opacity: 0.8;">Senha</label>
                            <input type="password" name="password" class="form-control border-0 bg-light p-3 rounded-3" 
                                   placeholder="••••••••" style="font-size: 0.9rem; border-left: 3px solid transparent;" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-3 fw-bold rounded-3 shadow-sm border-0 mt-2" 
                                style="background-color: #0d6efd; transition: all 0.3s ease;">
                            Entrar no Sistema <i class="fas fa-arrow-right ms-2 small"></i>
                        </button>
                    </form>

                    {% if messages %}
                    <div class="mt-4">
                        {% for message in messages %}
                        <div class="p-3 rounded-3 bg-danger-subtle text-danger small text-center fw-medium border-0">
                             {{ message }}
                        </div>
                        {% endfor %}
                    </div>
                    {% endif %}

                </div>
            </div>
            
            <p class="text-center text-muted small" style="opacity: 0.6;">
                <i class="fas fa-lock me-1"></i> Conexão Segura
            </p>
        </div>
    </div>
</div>

<style>
    /* Estilo de foco em azul */
    .form-control:focus {
        background-color: #fff !important;
        box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.15);
        border-left: 3px solid #0d6efd !important;
        outline: none;
    }

    .tracking-tight {
        letter-spacing: -1px;
    }

    body {
        background: linear-gradient(135deg, #f5f7fa 0%, #e4e9f2 100%);
        min-height: 100vh;
    }

    /* Efeito hover no botão */
    .btn-primary:hover {
        background-color: #0056b3 !important;
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(13, 110, 253, 0.3);
    }
</style>
{% endblock main_content %}
