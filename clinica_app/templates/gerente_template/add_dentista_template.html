{% extends 'base.html' %}
{% load static %}

{% block main_content %}
<div class="container-fluid">
    <div class="card shadow-sm border-0">
        <div class="card-header bg-primary py-3">
            <h3 class="card-title text-white mb-0 fw-bold">
                <img src="{% static 'adicionar.png' %}" style="width: 24px; filter: brightness(0) invert(1);" class="me-2">
                Cadastrar Novo Dentista
            </h3>
        </div>
        
        <form action="{% url 'add_dentista_save' %}" method="post" class="card-body p-4">
            {% csrf_token %}

            <h5 class="text-secondary border-bottom pb-2 mb-3">Informações Pessoais</h5>
            <div class="row">
                <div class="col-md-12 mb-3">
                    <label class="fw-bold">Nome Completo</label>
                    <input type="text" name="nome_completo" class="form-control" placeholder="Nome completo do profissional" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="fw-bold">CPF</label>
                    <input type="text" name="cpf" class="form-control cpf" placeholder="000.000.000-00">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="fw-bold">Data de Nascimento</label>
                    <input type="date" name="data_nascimento" class="form-control">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="fw-bold">Telefone / WhatsApp</label>
                    <input type="text" name="telefone" class="form-control phone" placeholder="(00) 00000-0000">
                </div>
            </div>

            <h5 class="text-secondary border-bottom pb-2 mb-3 mt-4">Acesso e Profissional</h5>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="fw-bold">E-mail (Login)</label>
                    <input type="email" name="email" class="form-control" placeholder="dentista@clinica.com" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="fw-bold">Senha Provisória</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="col-md-2 mb-3">
                    <label class="fw-bold">CRO</label>
                    <input type="text" name="cro" class="form-control" placeholder="00000-UF" required>
                </div>
                <div class="col-md-2 mb-3">
                    <label class="fw-bold">Especialidade</label>
                    <input type="text" name="especialidade" class="form-control" placeholder="Ex: Ortodontia" required>
                </div>
            </div>

            <h5 class="text-secondary border-bottom pb-2 mb-3 mt-4">Endereço</h5>
            <div class="mb-4">
                <textarea name="address" class="form-control" rows="2" placeholder="Rua, Número, Bairro, Cidade"></textarea>
            </div>

            <div class="d-grid gap-2 d-md-flex justify-content-md-end border-top pt-4">
                <a href="{% url 'manage_dentista' %}" class="btn btn-light px-4 border">Cancelar</a>
                <button type="submit" class="btn btn-primary px-5 fw-bold">Finalizar Cadastro</button>
            </div>
        </form>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
<script>
    $(document).ready(function(){
        $('.cpf').mask('000.000.000-00');
        $('.phone').mask('(00) 00000-0000');
    });
</script>
{% endblock main_content %}
