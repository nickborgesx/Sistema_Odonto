{% extends 'base.html' %}
{% load static %}

{% block main_content %}
<div class="container-fluid py-4">
    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-header bg-primary py-3 text-white rounded-top-4">
            <h3 class="card-title mb-0 fw-bold"><i class="fas fa-user-md me-2"></i>Cadastrar Dentista</h3>
        </div>
        <form action="{% url 'add_dentista_save' %}" method="post" class="card-body p-4">
            {% csrf_token %}
            <h5 class="text-secondary border-bottom pb-2 mb-3">Dados Profissionais</h5>
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Especialidade</label>
                    <input type="text" name="especialidade" class="form-control" placeholder="Ex: Ortodontia" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">CRO</label>
                    <input type="text" name="cro" class="form-control" placeholder="00000-UF" required>
                </div>
            </div>

            <h5 class="text-secondary border-bottom pb-2 mb-3">Informações Pessoais</h5>
            <div class="row g-3 mb-4">
                <div class="col-md-8">
                    <label class="form-label fw-bold">Nome Completo</label>
                    <input type="text" name="nome_completo" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">CPF</label>
                    <input type="text" name="cpf" class="form-control cpf" placeholder="000.000.000-00" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">E-mail (Login)</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">Telefone</label>
                    <input type="text" name="telefone" class="form-control phone" placeholder="(00) 0 0000-0000">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">Data de Nascimento</label>
                    <input type="date" name="data_nascimento" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Senha Inicial</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="col-md-12">
                    <label class="form-label fw-bold">Endereço Profissional</label>
                    <textarea name="address" class="form-control" rows="2"></textarea>
                </div>
            </div>
            <div class="text-end mt-4">
                <button type="submit" class="btn btn-primary px-5 fw-bold shadow-sm">Finalizar Cadastro</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block custom_js %}
<script>
    $(document).ready(function(){
        $('.cpf').mask('000.000.000-00');
        $('.phone').mask('(00) 0 0000-0000');
    });
</script>
{% endblock %}
