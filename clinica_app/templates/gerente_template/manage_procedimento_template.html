{% extends 'base.html' %}
{% block main_content %}
<div class="container">
    <div class="row">
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white py-3">
                    <h5 class="mb-0 fw-bold">Novo Procedimento</h5>
                </div>
                <form action="{% url 'add_procedimento_save' %}" method="post" class="card-body">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-medium">Nome do Serviço</label>
                        <input type="text" name="nome" class="form-control" placeholder="Ex: Limpeza, Canal..." required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">Valor (R$)</label>
                        <input type="text" name="valor" class="form-control" placeholder="0.00" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold">Salvar Serviço</button>
                </form>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0 fw-bold">Serviços Cadastrados</h5>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="bg-light">
                                <tr>
                                    <th class="ps-4">Serviço</th>
                                    <th>Valor</th>
                                    <th class="text-end pe-4">Ações</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for proc in procedimentos %}
                                <tr>
                                    <td class="ps-4 fw-medium">{{ proc.nome }}</td>
                                    <td>R$ {{ proc.valor }}</td>
                                    <td class="text-end pe-4">
                                        <a href="{% url 'delete_procedimento' proc.id %}" class="btn btn-outline-danger btn-sm" onclick="return confirm('Excluir este serviço?')">Excluir</a>
                                    </td>
                                </tr>
                                {% empty %}
                                <tr>
                                    <td colspan="3" class="text-center py-4 text-muted">Nenhum procedimento cadastrado.</td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock main_content %}
