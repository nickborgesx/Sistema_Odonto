{% extends 'base.html' %}
{% load static %}

{% block main_content %}
<style>
    :root {
        --text-main: #0f172a;    /* Azul marinho quase preto (Contraste Máximo) */
        --text-secondary: #334155; /* Cinza escuro azulado */
        --accent: #2563eb;       /* Azul primário */
        --border-saas: #cbd5e1;  /* Borda visível */
    }

    .page-container {
        animation: fadeIn 0.5s ease-in-out;
        max-width: 850px;
        margin: 0 auto;
    }

    /* Card de Edição */
    .edit-card {
        background: #ffffff;
        border-radius: 20px;
        border: 1px solid rgba(0, 0, 0, 0.1);
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        overflow: hidden;
    }

    .edit-header {
        background: #f8fafc;
        padding: 24px 35px;
        border-bottom: 2px solid #f1f5f9;
    }

    .edit-body {
        padding: 35px;
    }

    /* Títulos e Labels de Alto Contraste */
    .title-saas {
        color: var(--text-main) !important;
        font-weight: 800;
        font-size: 1.5rem;
    }

    .label-saas {
        font-size: 0.85rem;
        font-weight: 800;
        color: var(--text-main);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 8px;
        display: block;
    }

    /* Inputs e Selects Reforçados */
    .form-control-saas {
        border: 2px solid var(--border-saas);
        border-radius: 12px;
        padding: 12px 16px;
        font-size: 1rem;
        color: var(--text-main);
        font-weight: 600;
        background-color: #ffffff;
        transition: all 0.2s ease;
    }

    .form-control-saas:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
        outline: none;
    }

    /* Select customizado com seta escura */
    .form-select-saas {
        appearance: none;
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%230f172a' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
        background-repeat: no-repeat;
        background-position: right 1rem center;
        background-size: 16px 12px;
    }

    /* Botões de Ação */
    .btn-save {
        background-color: var(--accent);
        color: #ffffff;
        border: none;
        padding: 16px 30px;
        border-radius: 12px;
        font-weight: 700;
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        transition: all 0.3s ease;
    }

    .btn-save:hover {
        background-color: #1d4ed8;
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
        color: #ffffff;
    }

    .btn-back {
        background-color: #f1f5f9;
        color: var(--text-secondary);
        border: none;
        padding: 16px 25px;
        border-radius: 12px;
        font-weight: 700;
        transition: all 0.2s;
        text-decoration: none;
        display: inline-block;
        text-align: center;
    }

    .btn-back:hover {
        background-color: #e2e8f0;
        color: var(--text-main);
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<div class="container-fluid py-5 page-container">
    
    <div class="text-center mb-4">
        <h2 class="title-saas" style="font-size: 2.2rem; letter-spacing: -1px;">Ajustar Agendamento</h2>
        <p style="color: var(--text-secondary); font-weight: 500;">Modifique os dados da consulta abaixo e salve as alterações.</p>
    </div>

    <div class="edit-card">
        <div class="edit-header d-flex align-items-center">
            <div class="bg-primary text-white p-2 rounded-3 me-3" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">
                <i class="fas fa-edit"></i>
            </div>
            <h5 class="mb-0 fw-bold text-dark">Editar Dados da Consulta</h5>
        </div>

        <form action="{% url 'edit_consulta_save' %}" method="post" class="edit-body">
            {% csrf_token %}
            <input type="hidden" name="consulta_id" value="{{ consulta.id }}">

            <div class="row g-4 mb-4">
                <div class="col-md-6">
                    <label class="label-saas">Paciente</label>
                    <select name="paciente" class="form-control form-control-saas form-select-saas" required>
                        {% for p in pacientes %}
                            <option value="{{ p.id }}" {% if p.id == consulta.paciente_id.id %}selected{% endif %}>
                                {{ p.admin.first_name }} {{ p.admin.last_name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="label-saas">Dentista Responsável</label>
                    <select name="dentista" class="form-control form-control-saas form-select-saas" required>
                        {% for d in dentistas_options %}
                            <option value="{{ d.id }}" {% if d.id == consulta.dentista_id.id %}selected{% endif %}>Dr(a). {{ d.label }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="row g-4 mb-4">
                <div class="col-md-6">
                    <label class="label-saas">Procedimento</label>
                    <select name="procedimento" class="form-control form-control-saas form-select-saas" required>
                        {% for proc in procedimentos %}
                            <option value="{{ proc.id }}" {% if proc.id == consulta.procedimento_id.id %}selected{% endif %}>
                                {{ proc.nome }} (R$ {{ proc.valor }})
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="label-saas">Data e Horário</label>
                    <input type="datetime-local" name="data_consulta" class="form-control form-control-saas" 
                           value="{{ consulta.data_consulta|date:'Y-m-d\TH:i' }}" required>
                </div>
            </div>

            <div class="row mb-5">
                <div class="col-md-6">
                    <label class="label-saas">Status do Atendimento</label>
                    <select name="status" class="form-control form-control-saas form-select-saas">
                        <option value="0" {% if not consulta.status %}selected{% endif %}>🕒 Pendente</option>
                        <option value="1" {% if consulta.status %}selected{% endif %}>✅ Concluída</option>
                    </select>
                </div>
            </div>

            <div class="d-flex flex-column gap-3 pt-4 border-top">
                <button type="submit" class="btn btn-save w-100">
                    <i class="fas fa-save me-2"></i> Salvar Alterações
                </button>
                <a href="{% url 'gerente_home' %}" class="btn btn-back w-100">
                    Cancelar e Voltar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock main_content %}
