{% extends 'base.html' %}
{% block main_content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-primary text-white py-3">
                <h4 class="mb-0 fw-bold"> Novo Agendamento</h4>
            </div>
            <form action="{% url 'add_consulta_save' %}" method="post" class="card-body p-4">
                {% csrf_token %}
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Paciente</label>
                        <select name="paciente" class="form-control" required>
                            <option value="">Selecione o paciente...</option>
                            {% for p in pacientes %}
                                <option value="{{ p.id }}">{{ p.admin.first_name }} {{ p.admin.last_name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Dentista Responsável</label>
                        <select name="dentista" class="form-control" required>
                            <option value="">Selecione o dentista...</option>
                            {% for d in dentistas %}
                                <option value="{{ d.id }}">Dr(a). {{ d.admin.first_name }} {{ d.admin.last_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Procedimento</label>
                        <select name="procedimento" class="form-control" required>
                            <option value="">Selecione o serviço...</option>
                            {% for proc in procedimentos %}
                                <option value="{{ proc.id }}">{{ proc.nome }} (R$ {{ proc.valor }})</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Data e Hora</label>
                        <input type="datetime-local" name="data_consulta" class="form-control" required>
                    </div>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Confirmar Agendamento</button>
                    <a href="{% url 'gerente_home' %}" class="btn btn-light w-100 mt-2 text-muted">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock main_content %}
