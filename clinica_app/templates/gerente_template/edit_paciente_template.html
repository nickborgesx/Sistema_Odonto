{% extends 'base.html' %}
{% block main_content %}
<div class="card shadow">
    <div class="card-header bg-warning">
        <h3 class="card-title text-dark">Editar Paciente: {{ user.first_name }} {{ user.last_name }}</h3>
    </div>
    <form action="{% url 'edit_paciente_save' %}" method="post" class="card-body">
        {% csrf_token %}
        <input type="hidden" name="paciente_id" value="{{ user.id }}">

        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Nome</label>
                <input type="text" name="first_name" class="form-control" value="{{ user.first_name }}" required>
            </div>
            <div class="col-md-6 mb-3">
                <label>Sobrenome</label>
                <input type="text" name="last_name" class="form-control" value="{{ user.last_name }}" required>
            </div>
        </div>

        <div class="row">
            <div class="col-md-12 mb-3">
                <label>E-mail (Login)</label>
                <input type="email" name="email" class="form-control" value="{{ user.email }}" required>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Gênero</label>
                <select name="genero" class="form-control">
                    <option value="Masculino" {% if paciente.genero == "Masculino" %}selected{% endif %}>Masculino</option>
                    <option value="Feminino" {% if paciente.genero == "Feminino" %}selected{% endif %}>Feminino</option>
                    <option value="Outro" {% if paciente.genero == "Outro" %}selected{% endif %}>Outro</option>
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label>Endereço</label>
                <input type="text" name="address" class="form-control" value="{{ paciente.address }}">
            </div>
        </div>

        <div class="mb-3">
            <label>Histórico Médico / Observações</label>
            <textarea name="historico_medico" class="form-control" rows="4">{{ paciente.historico_medico }}</textarea>
        </div>

        <div class="d-flex justify-content-between">
            <a href="{% url 'manage_paciente' %}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-warning">Atualizar Cadastro</button>
        </div>
    </form>
</div>
{% endblock main_content %}
