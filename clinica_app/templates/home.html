{% extends 'base.html' %}
{% load static %}
{% block main_content %}
<div class="login-bg d-flex align-items-center justify-content-center">
    <div class="login-card d-flex overflow-hidden shadow-2xl">
        
        <div class="brand-side d-none d-lg-flex flex-column justify-content-center align-items-center p-5 text-white">
            <div class="logo-static-container mb-4">
                <img src="{% static 'nlogo.png' %}" alt="Logo OdontoGestão" class="img-fluid main-logo">
            </div>
            
            <div class="text-center">
                <h1 class="fw-black text-white tracking-tighter mb-2">OdontoGestão</h1>
                <p class="fw-normal text-white">Sua clínica em boas mãos.</p>
            </div>
        </div>

        <div class="form-side bg-white p-5 d-flex flex-column justify-content-center">
            <div class="form-content">
                <div class="mb-5 text-center text-lg-start">
                    <h2 class="fw-bold text-dark">Acessar Sistema</h2>
                    <p class="text-muted">Insira seus dados para entrar no painel.</p>
                </div>

                <form action="{% url 'doLogin' %}" method="post">
                    {% csrf_token %}
                    
                    <div class="input-group-custom mb-4">
                        <label class="form-label-custom">E-mail</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope icon-input"></i>
                            <input type="email" name="email" class="form-control-custom" 
                                   placeholder="seuemail@clinica.com" required>
                        </div>
                    </div>

                    <div class="input-group-custom mb-4">
                        <label class="form-label-custom">Senha</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock icon-input"></i>
                            <input type="password" name="password" class="form-control-custom" 
                                   placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary-custom w-100 py-3 mb-4">
                        Entrar no Sistema
                    </button>
                </form>

                <div class="footer-info text-center mt-4">
                    <span class="text-muted small fw-bold">Created by Nicolas Borges</span>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .login-bg {
        min-height: 100vh;
        padding: 24px;
        background:
          radial-gradient(900px 600px at 15% 15%, rgba(37, 99, 235, 0.16) 0%, rgba(37, 99, 235, 0) 60%),
          radial-gradient(900px 600px at 85% 80%, rgba(29, 78, 216, 0.12) 0%, rgba(29, 78, 216, 0) 55%),
          linear-gradient(135deg, #eef2ff 0%, #eff6ff 100%);
        border-radius: 16px;
    }

    .login-card {
        width: 1000px;
        min-height: 600px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid rgba(17, 24, 39, 0.08);
        box-shadow: 0 30px 70px -30px rgba(16, 24, 40, 0.30);
        animation: pop-in 340ms ease-out both;
    }

    .brand-side {
        width: 40%;
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
        position: relative;
    }

    .brand-side::before{
        content:"";
        position:absolute;
        inset:0;
        background:
          radial-gradient(500px 300px at 30% 20%, rgba(255,255,255,0.25) 0%, rgba(255,255,255,0) 65%),
          radial-gradient(420px 260px at 70% 80%, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0) 60%);
        pointer-events:none;
    }

    .main-logo { width: 120px; filter: brightness(0) invert(1); }
    .fw-black { font-weight: 800; letter-spacing: -1px; }

    .form-side { width: 60%; }

    .input-group-custom .form-label-custom {
        display: block;
        font-size: 0.8rem;
        font-weight: 600;
        color: #475569;
        margin-bottom: 6px;
    }

    .input-wrapper { position: relative; }

    .icon-input {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: #94a3b8;
        font-size: 0.85rem;
    }

    /* ALINHAMENTO DO TEXTO: Padding reduzido para encostar mais no ícone */
    .form-control-custom {
        width: 100%;
        padding: 12px 12px 12px 34px; 
        border: 1.5px solid #e2e8f0;
        border-radius: 10px;
        transition: all 0.2s;
        font-size: 0.95rem;
    }

    .form-control-custom:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.14);
        outline: none;
    }

    .btn-primary-custom {
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
        color: #ffffff;
        border: 2px solid rgba(29, 78, 216, 0.55);
        border-radius: 10px;
        font-weight: 600;
        transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
        box-shadow: 0 14px 30px -18px rgba(29, 78, 216, 0.75);
    }

    .btn-primary-custom:hover {
        filter: brightness(1.02);
        transform: translateY(-1px);
        box-shadow: 0 18px 38px -20px rgba(29, 78, 216, 0.85);
    }

    .btn-primary-custom:active {
        transform: translateY(0px);
    }

    @keyframes pop-in{
        from { transform: translateY(8px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }

    .alert-error {
        background: #fef2f2;
        color: #991b1b;
        padding: 12px;
        border-radius: 8px;
        font-size: 0.9rem;
        border: 1px solid #fee2e2;
    }

    @media (max-width: 991px) {
        .login-card { width: 95%; height: auto; margin: 15px; }
        .form-side { width: 100%; padding: 40px !important; }
    }
</style>
{% endblock main_content %}
